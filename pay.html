<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Nexcom Ventures | Secure Payment Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #E4002B; --primary-dark: #B5001F;
      --bg: #F5F5F5; --white: #FFFFFF;
      --text: #1A1A1A; --muted: #6B7280; --border: #E5E7EB;
      --mpesa: #49B249;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
    header {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 1rem 3%; display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: var(--text); text-decoration: none; }
    .logo span { color: var(--primary); }
    
    .pay-container { max-width: 500px; margin: 3rem auto; padding: 0 1rem; }
    .pay-card {
      background: var(--white); border-radius: 16px; padding: 2.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
    }
    .pay-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; text-align: center; }
    .pay-sub { font-size: 0.9rem; color: var(--muted); text-align: center; margin-bottom: 2rem; }
    
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .form-group input {
      width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 1rem; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--primary); }
    
    .mpesa-box {
      background: #f0faf0; border: 1px dashed var(--mpesa); border-radius: 12px;
      padding: 1.5rem; margin: 1.5rem 0; text-align: center;
    }
    .mpesa-title { color: var(--mpesa); font-weight: 800; font-size: 1.1rem; margin-bottom: 0.5rem; }
    .mpesa-details { font-family: monospace; font-size: 1.2rem; font-weight: 700; color: #333; }
    
    .pay-btn {
      width: 100%; background: var(--primary); color: #fff; border: none;
      border-radius: 10px; padding: 14px; font-size: 1.1rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .pay-btn:hover { background: var(--primary-dark); }
    
    .secure-note {
      text-align: center; margin-top: 1.5rem; font-size: 0.75rem; color: var(--muted);
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    
    footer { text-align: center; margin-top: 2rem; font-size: 0.8rem; color: var(--muted); padding-bottom: 2rem; }
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Nex<span>com</span></a>
  <a href="index.html" style="font-size:0.9rem; color:var(--muted); text-decoration:none; font-weight:600;">← Back to Home</a>
</header>

<div class="pay-container">
  <div class="pay-card">
    <h1 class="pay-title">Secure Payment</h1>
    <p class="pay-sub">Pay your invoice via M-Pesa Buy Goods</p>

    <div class="mpesa-box">
      <div class="mpesa-title">Lipa Na M-PESA</div>
      <div style="font-size: 0.85rem; color: #555; margin-bottom: 4px;">Paybill Number</div>
      <div class="mpesa-details">880100</div>
      <div style="font-size: 0.85rem; color: #555; margin-top: 8px; margin-bottom: 4px;">Account Number</div>
      <div class="mpesa-details">816001</div>
      <div style="font-size: 0.8rem; color: #666; margin-top: 8px;">(Nexcom Ventures Ltd)</div>
    </div>
    
    <form id="payForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your Name" required>
      </div>
      
      <div class="form-group">
        <label>WhatsApp Number</label>
        <input type="tel" id="phone" placeholder="2547XXXXXXXX" required>
      </div>
      
      <div class="form-group">
        <label>Invoice / Order Ref</label>
        <input type="text" id="invoice" placeholder="Optional">
      </div>
      
      <div class="form-group">
        <label>Amount Paid (KES)</label>
        <input type="number" id="amount" placeholder="Amount" required>
      </div>
      
      <button type="submit" class="pay-btn" id="payBtn">
        Confirm via WhatsApp
      </button>
    </form>
    
    <div class="secure-note">
      🔒 Secure Payment Confirmation
    </div>
  </div>
</div>

<footer>
  &copy; 2026 Nexcom Ventures Limited. All Rights Reserved.
</footer>

<script>
  document.getElementById('payForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const invoice = document.getElementById('invoice').value || 'New Payment';
    const amount = document.getElementById('amount').value;
    
    const message = `Hello Nexcom, I've just made a payment.\n\n` +
                    `👤 Name: ${name}\n` +
                    `📞 Phone: ${phone}\n` +
                    `📄 Ref: ${invoice}\n` +
                    `💰 Amount: KES ${amount}\n\n` +
                    `Please confirm receipt. Thank you!`;
    
    const waUrl = `https://wa.me/254722816001?text=${encodeURIComponent(message)}`;
    
    // Open WhatsApp
    window.location.href = waUrl;
  });
</script>

</body>
</html>
